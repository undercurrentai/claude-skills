name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp version into all plugin manifests
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update marketplace metadata version
          jq --arg v "$VERSION" '.metadata.version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Update all plugin versions in marketplace listing
          jq --arg v "$VERSION" '.plugins[].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Update each plugin's own plugin.json
          for f in plugins/*; do
            plugin_json="$f/.claude-plugin/plugin.json"
            if [ -f "$plugin_json" ]; then
              jq --arg v "$VERSION" '.version = $v' "$plugin_json" > tmp.json && mv tmp.json "$plugin_json"
              echo "Stamped $plugin_json -> $VERSION"
            fi
          done

          echo "All manifests stamped to $VERSION"

      - name: Commit version bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No version changes to commit" || \
            git commit -m "Stamp all versions to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin main

      - name: Get commit messages since last tag
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            # Get commits between previous tag and current
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          # Save to output (handle multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Claude Code Skills Marketplace Release

            ### Available Skills
            - **sams-voice**: Writing voice and style (English/French)
            - **sams-architecture**: Architectural patterns (Python/DevOps/Embedded)
            - **outcome-engineering**: Outcome-first workflow framing (o16g)
            - **technical-blog-post**: Technical blog post writing from raw project data
            - **sketch-checker**: Metal band fascist ties research (NSBM/far-right vetting)

            ### Installation

            ```bash
            # Add marketplace
            /plugin marketplace add sam-dumont/claude-skills

            # Install skills
            /plugin install sams-voice@sams-skills
            /plugin install sams-architecture@sams-skills
            /plugin install outcome-engineering@sams-skills
            /plugin install technical-blog-post@sams-skills
            /plugin install sketch-checker@sams-skills
            ```

            ### What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---

            **Full Changelog**: https://github.com/undercurrentai/claude-skills/commits/${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
