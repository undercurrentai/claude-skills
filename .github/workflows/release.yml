name: Release

# KNOWN ORG LIMITATION: tag-push events DO NOT fire workflows in the
# undercurrentai org (verified 2026-04-28 across 9 test tags). Tag DELETE
# events appear in the events feed normally; tag CREATE events are
# systematically filtered before reaching the Actions runtime. Root cause
# is org-level (invisible to gh CLI / REST API). Until that is resolved
# via GitHub Support, the path to release is:
#   1. git tag -a vX.Y.Z -m "..." && git push origin vX.Y.Z
#   2. gh workflow run release.yml --ref main -f tag=vX.Y.Z
# The push:tags trigger below is preserved so the workflow self-heals
# when the org-level filter is fixed.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.7.2). Must already exist on the repo.'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag from trigger
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG (version: $VERSION) from event ${{ github.event_name }}"

      # The optional RELEASE_TOKEN secret is a fine-grained PAT scoped to
      # this repo with `contents: write`. When set, actions/checkout
      # persists it and subsequent `git push` operations run with the
      # PAT-bearer's identity (e.g., RepositoryAdmin or OrganizationAdmin)
      # — which CAN bypass the org-default-branch-protection ruleset's
      # PR-required rule. Without the secret, the action falls back to
      # GITHUB_TOKEN and the commit-back step degrades gracefully (logs
      # warning, doesn't fail). Per github.blog/changelog/2025-09-10
      # ruleset bypass + the canonical SO answer (Laird Nelson 2023-11):
      # GITHUB_TOKEN cannot be tied to an org role for git operations;
      # only a PAT can.
      - name: Checkout the tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.tag }}
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Stamp version into all plugin manifests
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"

          # Update marketplace metadata version
          jq --arg v "$VERSION" '.metadata.version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Update all plugin versions in marketplace listing
          jq --arg v "$VERSION" '.plugins[].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Update each plugin's own plugin.json
          for f in plugins/*; do
            plugin_json="$f/.claude-plugin/plugin.json"
            if [ -f "$plugin_json" ]; then
              jq --arg v "$VERSION" '.version = $v' "$plugin_json" > tmp.json && mv tmp.json "$plugin_json"
              echo "Stamped $plugin_json -> $VERSION"
            fi
          done

          echo "All manifests stamped to $VERSION"

      - name: Commit version bump back to main (best-effort)
        # When RELEASE_TOKEN is set (fine-grained PAT with contents:write),
        # the previous Checkout step persisted that PAT for git operations.
        # The PAT bearer (RepositoryAdmin / OrganizationAdmin per the org
        # rulesets) bypasses the default-branch-protection PR rule and the
        # push succeeds. Without RELEASE_TOKEN, the persisted token is
        # GITHUB_TOKEN, which github-actions[bot] uses, which is NOT on the
        # ruleset bypass list — push gets rejected with GH013 "Changes must
        # be made through a pull request." continue-on-error keeps the
        # release flow moving regardless.
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::notice::RELEASE_TOKEN present — committing as PAT bearer (should bypass branch protection)"
            git config user.name "${GITHUB_ACTOR}"
            git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          else
            echo "::warning::RELEASE_TOKEN not set — using github-actions[bot] identity (will be blocked by org-default-branch-protection ruleset)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
          fi
          git add .claude-plugin/marketplace.json
          for pj in plugins/*/.claude-plugin/plugin.json; do git add "$pj"; done
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "Stamp all versions to ${{ steps.resolve.outputs.tag }} [skip ci]"
            if git push origin HEAD:main 2>&1; then
              echo "::notice::Pushed version stamps directly to main"
            else
              echo "::warning::Direct push to main blocked. To enable auto-stamping, set the RELEASE_TOKEN secret to a fine-grained PAT with contents:write on this repo."
            fi
          fi

      - name: Get commit messages since last tag
        id: changelog
        run: |
          # Get previous tag (the one before the tag we're releasing)
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.resolve.outputs.tag }}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges ${{ steps.resolve.outputs.tag }})
          else
            # Get commits between previous tag and current
            CHANGELOG=$(git log ${PREV_TAG}..${{ steps.resolve.outputs.tag }} --pretty=format:"- %s" --no-merges)
          fi

          # Save to output (handle multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: Release ${{ steps.resolve.outputs.tag }}
          body: |
            ## Claude Code Skills Marketplace Release

            ### Available Skills
            - **sams-voice**: Writing voice and style (English/French)
            - **joshs-voice**: Writing voice and style for Joshua Kirby (English; essays/reflective prose/theological/philosophical)
            - **sams-architecture**: Architectural patterns (Python/DevOps/Embedded/Frontend)
            - **outcome-engineering**: Outcome-first workflow framing (o16g)
            - **technical-blog-post**: Technical blog post writing from raw project data
            - **legal-voice**: Rigorous legal writing voice (briefs, motions, contracts, memoranda, demand letters)
            - **sketch-checker**: Metal band fascist ties research (NSBM/far-right vetting)

            ### Installation

            ```bash
            # Add marketplace
            /plugin marketplace add undercurrentai/claude-skills

            # Install skills
            /plugin install sams-voice@undercurrent-skills
            /plugin install joshs-voice@undercurrent-skills
            /plugin install sams-architecture@undercurrent-skills
            /plugin install outcome-engineering@undercurrent-skills
            /plugin install technical-blog-post@undercurrent-skills
            /plugin install legal-voice@undercurrent-skills
            /plugin install sketch-checker@undercurrent-skills
            ```

            ### What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---

            **Full Changelog**: https://github.com/undercurrentai/claude-skills/commits/${{ steps.resolve.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
